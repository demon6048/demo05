<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Control Diario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        @media (min-width: 1024px) { .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; } }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f1115; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        .task-card { min-height: 60px; border-width: 1px; border-color: #374151; transition: all 0.2s ease; }
        .task-card:hover { border-color: #4b5563; background-color: #242933; }
        .mic-active { color: #22d3ee !important; animation: pulse-cyan 1.5s infinite; }
        @keyframes pulse-cyan { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-[#0f1115] text-slate-200 font-sans h-screen flex flex-col overflow-hidden selection:bg-blue-500/30 text-left">

    <!-- CABECERA -->
    <header class="bg-[#161b22] border-b border-gray-800 p-4 md:px-6 md:py-4 shadow-md z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div class="flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-8 w-full md:w-auto">
            <div class="flex flex-col">
                <h1 class="text-xl md:text-[22px] font-bold tracking-tight text-white flex items-center gap-2 text-left">
                    <div class="w-2.5 h-2.5 rounded-full bg-cyan-500 animate-pulse"></div>
                    Centro de Control Diario
                </h1>
                <p class="text-slate-400 text-[11px] md:text-xs capitalize mt-0.5 text-left" id="current-date"></p>
            </div>
            <div class="hidden md:block w-px h-10 bg-gray-700"></div>
            <div class="flex gap-6 md:gap-8 w-full md:w-auto justify-around md:justify-start border-t md:border-t-0 border-gray-800 pt-3 md:pt-0 text-center">
                <div class="flex flex-col items-center">
                    <span class="text-[9px] md:text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">Pendientes</span>
                    <span class="text-lg md:text-xl font-bold text-red-500 leading-none" id="stat-pending">0</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[9px] md:text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">En Proceso</span>
                    <span class="text-lg md:text-xl font-bold text-blue-500 leading-none" id="stat-progress">0</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[9px] md:text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">Completadas</span>
                    <span class="text-lg md:text-xl font-bold text-green-500 leading-none" id="stat-completed">0</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-end">
            <div class="text-xl md:text-2xl font-mono font-bold tracking-widest text-white bg-[#0f1115] px-4 py-1.5 rounded-lg border border-gray-800 hidden sm:block" id="current-time">00:00:00</div>
            <button onclick="openModal()" class="flex-1 md:flex-none flex justify-center items-center gap-2 bg-cyan-600 hover:bg-cyan-500 text-white px-4 py-2 md:py-2.5 rounded-md font-bold transition-all text-sm shadow-md active:scale-95">
                <i class="fas fa-plus"></i><span>Nueva Tarea</span>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto p-3 md:p-6 custom-scrollbar">
        <div class="flex flex-col gap-4 md:gap-5 w-full max-w-[1300px] mx-auto pb-10" id="kanban-board"></div>
    </main>

    <!-- MODAL TAREA INTELIGENTE -->
    <div id="task-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex justify-center items-center backdrop-blur-sm overflow-y-auto p-4 text-left">
        <div class="bg-[#161b22] border border-gray-700 rounded-xl w-full max-w-lg p-5 md:p-6 shadow-2xl transform transition-all my-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg md:text-xl font-bold text-white uppercase tracking-widest text-xs">Añadir con IA (Groq)</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white p-1 transition-colors"><i class="fas fa-times text-xl"></i></button>
            </div>

            <!-- ASISTENTE DE VOZ (INMORTAL Y ACUMULATIVO) -->
            <div class="mb-5 md:mb-6 p-4 bg-gradient-to-r from-cyan-900/30 to-blue-900/30 border border-cyan-500/30 rounded-xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-cyan-500 to-blue-500"></div>
                <label class="block text-sm font-bold text-cyan-400 mb-1 flex items-center gap-2 uppercase tracking-tighter">
                    <i class="fas fa-microphone-lines"></i> Dictado Inmortal y Acumulativo
                </label>
                <div class="flex gap-2 mt-2">
                    <div class="relative flex-1">
                        <textarea id="ai-input" placeholder="Hable libremente. El texto se acumulará y el micrófono no se apagará solo..." rows="3" class="w-full bg-[#0f1115] border border-cyan-500/50 rounded-lg pl-3 pr-12 py-3 text-white focus:border-cyan-400 outline-none text-sm resize-none custom-scrollbar transition-all"></textarea>
                        <button type="button" onclick="toggleSmartDictation()" class="absolute right-2 bottom-2 w-10 h-10 flex justify-center items-center bg-cyan-600/20 hover:bg-cyan-600/40 text-cyan-400 rounded-md transition-all group" id="btn-smart-mic">
                            <i class="fas fa-microphone text-lg" id="mic-icon"></i>
                        </button>
                    </div>
                </div>
                <div id="ai-status" class="text-[11px] text-cyan-400 mt-2 font-mono font-bold hidden flex flex-col gap-1">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-bolt animate-pulse text-yellow-400" id="ai-spinner"></i> <span id="status-text">Escuchando...</span>
                    </div>
                    <div id="api-error-info" class="text-[9px] text-red-400 italic hidden border-t border-red-900/30 pt-1 mt-1"></div>
                </div>
            </div>

            <form id="new-task-form" class="space-y-3 md:space-y-4">
                <div class="text-left text-xs">
                    <label class="block font-semibold text-slate-400 mb-1 uppercase tracking-wider">Título de la tarea</label>
                    <input type="text" id="task-title" required class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white focus:border-blue-500 outline-none">
                </div>
                <div class="text-left text-xs">
                    <label class="block font-semibold text-slate-400 mb-1 uppercase tracking-wider">Descripción</label>
                    <textarea id="task-desc" rows="2" class="w-full bg-[#0f1115] border border-gray-800 rounded-lg px-3 py-2 text-white focus:border-blue-500 outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4 text-left text-xs">
                    <div>
                        <label class="block font-semibold text-slate-400 mb-1 uppercase">Categoría</label>
                        <input type="text" id="task-cat" value="General" class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white outline-none">
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-400 mb-1 uppercase">Prioridad</label>
                        <select id="task-prio" class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white outline-none">
                            <option value="Alta">Alta</option>
                            <option value="Baja" selected>Baja</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 text-left text-xs">
                    <div>
                        <label class="block font-semibold text-slate-400 mb-1 uppercase text-[10px]">Fecha</label>
                        <input type="date" id="task-date" required class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white" style="color-scheme: dark;">
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-400 mb-1 uppercase text-[10px]">Hora</label>
                        <input type="time" id="task-time" required class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white">
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-800">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-semibold text-slate-300 hover:text-white transition-colors">Cancelar</button>
                    <button type="submit" class="px-6 py-2 bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-bold rounded-lg shadow-lg active:scale-95">Guardar Tarea</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- API KEY DE GROQ ---
        const aiKey = "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"; 

        let tasks = [];
        const COLUMNS = [
            { id: 'Prioridad Alta', title: '🔥 PRIORIDAD ALTA', bg: 'bg-[#1f1616]' },
            { id: 'En Proceso', title: '⚙️ EN PROCESO', bg: 'bg-[#161c22]' },
            { id: 'Pendientes', title: '📋 PENDIENTES / OTROS', bg: 'bg-[#1a1a1a]' },
            { id: 'Completadas', title: '✅ COMPLETADAS', bg: 'bg-[#161f18]' }
        ];

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('current-date').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderBoard() {
            const board = document.getElementById('kanban-board');
            if(!board) return;
            board.innerHTML = '';
            document.getElementById('stat-pending').innerText = tasks.filter(t => t.status === 'Pendientes' || t.status === 'Prioridad Alta').length;
            document.getElementById('stat-progress').innerText = tasks.filter(t => t.status === 'En Proceso').length;
            document.getElementById('stat-completed').innerText = tasks.filter(t => t.status === 'Completadas').length;

            COLUMNS.forEach(col => {
                const colTasks = tasks.filter(t => t.status === col.id);
                let colHTML = `<div class="w-full flex flex-col bg-[#161b22] border border-gray-800 rounded-xl overflow-hidden shadow-lg mb-4 text-left font-semibold">
                    <div class="p-3 border-b border-gray-800 flex justify-between items-center ${col.bg}">
                        <h2 class="font-bold text-[10px] md:text-[11px] tracking-widest text-slate-200 uppercase">${col.title}</h2>
                        <span class="bg-[#0f1115] text-slate-400 text-[10px] px-2 py-0.5 rounded font-bold border border-gray-800">${colTasks.length}</span>
                    </div>
                    <div class="p-2 md:p-3 flex flex-col gap-2 min-h-[50px] bg-[#161b22]">`;
                if (colTasks.length === 0) colHTML += `<div class="h-8 flex items-center justify-center text-[10px] text-slate-600 uppercase tracking-tighter italic w-full text-center">Vacio</div>`;
                colTasks.forEach(task => {
                    const statusColor = task.progress === 100 ? 'bg-green-500' : 'bg-cyan-500';
                    colHTML += `<div class="flex flex-col md:flex-row items-center justify-between gap-4 bg-[#1c212b] border border-gray-800 rounded-lg p-3 relative task-card">
                        <div class="absolute left-0 top-0 bottom-0 w-[3px] rounded-l-lg ${task.priority === 'Alta' ? 'bg-red-500' : 'bg-cyan-500'}"></div>
                        <div class="flex-1 pl-2 w-full md:w-auto min-w-0 text-left">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] font-bold uppercase text-slate-300 bg-[#0f1115] px-1.5 py-0.5 rounded border border-gray-800/50">${task.category}</span>
                                <span class="text-[9px] font-bold uppercase ${task.priority === 'Alta' ? 'text-red-400' : 'text-cyan-400'}">${task.priority}</span>
                            </div>
                            <h3 class="font-bold text-white text-base md:text-[17px] truncate text-left">${task.title}</h3>
                            <p class="text-[10px] text-slate-400 truncate text-left">${task.desc || '...'}</p>
                        </div>
                        <div class="bg-[#0f1115] p-2 rounded-md flex flex-row md:flex-col items-center justify-center gap-3 md:gap-0.5 border border-gray-800 min-w-[120px] shrink-0 text-center text-xs">
                            <div class="text-slate-400 font-semibold">${task.date}</div>
                            <div class="font-mono font-bold text-cyan-400">${task.time}</div>
                        </div>
                        <div class="w-full md:w-[320px] flex flex-col shrink-0 self-center">
                            <div class="flex justify-between items-end mb-1">
                                <span class="text-[9px] font-bold text-slate-200 uppercase tracking-widest">Avance</span>
                                <span class="text-[10px] font-bold font-mono text-cyan-400">${task.progress}%</span>
                            </div>
                            <div class="w-full h-1 bg-[#0f1115] rounded-full overflow-hidden mb-2 shadow-inner">
                                <div class="h-full transition-all duration-500 ${statusColor}" style="width: ${task.progress}%"></div>
                            </div>
                            <div class="flex gap-1">
                                ${[10, 25, 50, 75, 100].map(v => `<button onclick="updateTaskProgress('${task.id}', ${v})" class="flex-1 bg-transparent hover:bg-gray-800 border border-gray-700 text-[9px] py-1 rounded text-slate-400 transition-colors font-bold">${v === 100 ? 'Fin' : v+'%'}</button>`).join('')}
                            </div>
                        </div>
                    </div>`;
                });
                colHTML += `</div></div>`;
                board.innerHTML += colHTML;
            });
        }

        function updateTaskProgress(id, val) {
            const task = tasks.find(t => t.id === id);
            if(task) {
                task.progress = val;
                if(val === 100) task.status = 'Completadas';
                else if(val > 0) task.status = 'En Proceso';
                renderBoard();
            }
        }

        // ==========================================
        // MICRÓFONO INMORTAL Y ACUMULATIVO
        // ==========================================
        let recognition = null;
        let isRecording = false;
        let finalHistory = ""; 

        function toggleSmartDictation() {
            const inputEl = document.getElementById('ai-input');
            const iconEl = document.getElementById('mic-icon');
            const statusEl = document.getElementById('ai-status');

            if (isRecording) {
                isRecording = false;
                if (recognition) recognition.stop();
                iconEl.className = "fas fa-microphone text-lg";
                iconEl.classList.remove('mic-active');
                // Al detener, procesamos todo el acumulado con Groq
                if(inputEl.value.trim().length > 3) processWithGroq(inputEl.value);
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Navegador no soporta voz."); return; }
            
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = true;
            recognition.interimResults = true;
            
            // Sincronizar historia con lo que ya está escrito manualmente
            finalHistory = inputEl.value;

            recognition.onstart = () => {
                isRecording = true;
                iconEl.className = "fas fa-stop text-lg";
                iconEl.classList.add('mic-active');
                statusEl.classList.remove('hidden');
                document.getElementById('status-text').innerText = "Escuchando... El texto se acumulará.";
                document.getElementById('api-error-info').classList.add('hidden');
            };

            recognition.onresult = (event) => {
                let interimTranscript = "";
                let confirmedThisSession = "";

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        confirmedThisSession += transcript + " ";
                    } else {
                        interimTranscript += transcript;
                    }
                }
                
                if (confirmedThisSession) {
                    finalHistory = (finalHistory.trim() ? finalHistory.trim() + " " : "") + confirmedThisSession;
                }

                inputEl.value = (finalHistory + interimTranscript).trim();
                inputEl.scrollTop = inputEl.scrollHeight;
            };

            recognition.onend = () => {
                // REINICIO AUTOMÁTICO INMEDIATO (LO HACE ETERNO)
                if (isRecording) {
                    try { recognition.start(); } catch(e){} 
                }
            };
            recognition.start();
        }

        // ==========================================
        // MOTOR DE IA: GROQ (CONEXIÓN ROBUSTA)
        // ==========================================
        async function processWithGroq(text) {
            const statusEl = document.getElementById('ai-status');
            const statusText = document.getElementById('status-text');
            const spinner = document.getElementById('ai-spinner');
            const errorInfo = document.getElementById('api-error-info');

            statusEl.classList.remove('hidden');
            errorInfo.classList.add('hidden');
            statusText.innerText = "IA procesando campos...";
            spinner.className = "fas fa-bolt animate-pulse text-yellow-400";

            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            
            const prompt = `Actúa como un extractor de datos profesional. Analiza el siguiente texto y devuelve un objeto JSON en español. 
            Texto: "${text}". 
            Fecha de hoy: ${todayStr}.
            FORMATO: {"title": "resumen", "desc": "detalles", "category": "tipo", "priority": "Alta"|"Baja", "date": "YYYY-MM-DD", "time": "HH:MM"}`;

            try {
                const apiUrl = "https://api.groq.com/openai/v1/chat/completions";
                
                // Sistema de respaldo con proxy si falla directo
                const tryFetch = async (url) => {
                    return await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${aiKey}`
                        },
                        body: JSON.stringify({
                            model: "llama-3.1-8b-instant",
                            messages: [
                                { role: "system", content: "Responde exclusivamente en JSON válido." },
                                { role: "user", content: prompt }
                            ],
                            temperature: 0.1,
                            response_format: { type: "json_object" }
                        })
                    });
                };

                let response;
                try {
                    response = await tryFetch(apiUrl);
                } catch(e) {
                    // Si falla por CORS, intentamos con el proxy
                    response = await tryFetch("https://corsproxy.io/?" + encodeURIComponent(apiUrl));
                }

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "Error del servidor Groq");
                }

                const result = await response.json();
                const data = JSON.parse(result.choices[0].message.content);

                // --- LLENADO DE CAMPOS ---
                document.getElementById('task-title').value = data.title || "";
                document.getElementById('task-desc').value = data.desc || "";
                document.getElementById('task-cat').value = data.category || "General";
                document.getElementById('task-date').value = data.date || todayStr;
                document.getElementById('task-time').value = data.time || "10:00";
                document.getElementById('task-prio').value = (data.priority === "Alta") ? "Alta" : "Baja";

                statusText.innerText = "¡Campos rellenados con éxito!";
                spinner.className = "fas fa-check-circle text-green-400";
                setTimeout(() => statusEl.classList.add('hidden'), 3000);

            } catch (e) {
                console.error("Error Groq:", e);
                statusText.innerText = "Error al procesar";
                spinner.className = "fas fa-exclamation-triangle text-red-400";
                errorInfo.innerHTML = `<b>Error:</b> ${e.message}`;
                errorInfo.classList.remove('hidden');
            }
        }

        function openModal() {
            document.getElementById('task-modal').classList.remove('hidden');
            const now = new Date();
            document.getElementById('task-date').value = now.toISOString().split('T')[0];
            document.getElementById('task-time').value = now.toTimeString().slice(0,5);
        }

        function closeModal() {
            document.getElementById('task-modal').classList.add('hidden');
            document.getElementById('new-task-form').reset();
            document.getElementById('ai-input').value = "";
            finalHistory = ""; 
            if (recognition) recognition.stop();
            isRecording = false;
        }

        document.getElementById('new-task-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const prio = document.getElementById('task-prio').value;
            const newTask = {
                id: 't' + Date.now(),
                title: document.getElementById('task-title').value,
                desc: document.getElementById('task-desc').value,
                category: document.getElementById('task-cat').value,
                priority: prio,
                status: (prio === 'Alta') ? 'Prioridad Alta' : 'Pendientes',
                progress: 0,
                date: document.getElementById('task-date').value,
                time: document.getElementById('task-time').value
            };
            tasks.push(newTask);
            renderBoard();
            closeModal();
        });

        renderBoard();
    </script>
</body>
</html>
