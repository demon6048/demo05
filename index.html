<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Control Diario</title>
    <!-- VERSIÓN DEFINITIVA: AUTO-SYNC, BLINDAJE ANTI-ZOMBIES E INDICADOR DE GUARDADO -->
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%2310b981'/><path d='M30 50 L45 65 L70 35' stroke='white' stroke-width='10' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        @media (min-width: 1024px) { .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; } }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f1115; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        .task-card { min-height: 60px; border-width: 1px; border-color: #374151; transition: all 0.2s ease; }
        .task-card:hover { border-color: #4b5563; background-color: #242933; }
        .mic-active { color: #22d3ee !important; animation: pulse-cyan 1.5s infinite; }
        @keyframes pulse-cyan { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes flash-red { 0% { background-color: #b91c1c; } 50% { background-color: #7f1d1d; } 100% { background-color: #b91c1c; } }
        .alarm-flashing { animation: flash-red 1s infinite; }
        #loading-overlay { backdrop-filter: blur(4px); }
        .sync-saving { color: #4ade80 !important; } /* Verde para indicar guardado */
    </style>
</head>
<body class="bg-[#0f1115] text-slate-200 font-sans h-screen flex flex-col overflow-hidden selection:bg-blue-500/30 text-left">

    <!-- BANNER DE ALARMA SONORA -->
    <div id="alarm-banner" class="fixed top-0 left-0 w-full alarm-flashing border-b-4 border-red-900 z-[100] hidden flex flex-col md:flex-row items-center justify-between p-4 md:px-8 shadow-2xl transition-transform transform translate-y-0">
        <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center shrink-0">
                <i class="fas fa-bell text-2xl text-white animate-bounce"></i>
            </div>
            <div class="text-white flex-1">
                <h3 class="font-black text-sm md:text-lg uppercase tracking-widest">⚠️ Prioridad Alta</h3>
                <p class="text-xs md:text-sm font-semibold opacity-90" id="alarm-task-title">Queda 1 hora o menos para una tarea.</p>
            </div>
        </div>
        <button onclick="stopAlarm()" class="mt-3 md:mt-0 w-full md:w-auto px-8 py-3 bg-black/40 hover:bg-black/60 text-white font-bold rounded-lg border border-white/30 transition-colors shadow-lg active:scale-95 whitespace-nowrap">
            <i class="fas fa-volume-mute mr-2"></i> Silenciar Alarma
        </button>
    </div>

    <!-- OVERLAY DE CARGA -->
    <div id="loading-overlay" class="fixed inset-0 bg-[#0f1115]/80 z-50 flex flex-col justify-center items-center">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-cyan-400 font-bold tracking-widest uppercase text-sm animate-pulse">Sincronizando con Google Sheets...</p>
    </div>

    <!-- CABECERA -->
    <header class="bg-[#161b22] border-b border-gray-800 p-4 md:px-6 md:py-4 shadow-md z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div class="flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-8 w-full md:w-auto">
            <div class="flex flex-col">
                <h1 class="text-xl md:text-[22px] font-bold tracking-tight text-white flex items-center gap-2 text-left">
                    <div class="w-2.5 h-2.5 rounded-full bg-cyan-500 animate-pulse"></div>
                    Centro de Control
                </h1>
                <p class="text-slate-400 text-[11px] md:text-xs capitalize mt-0.5 text-left" id="current-date"></p>
            </div>
            <div class="hidden md:block w-px h-10 bg-gray-700"></div>
            
            <!-- ESTADÍSTICAS -->
            <div id="stats-container" class="flex gap-6 md:gap-8 w-full md:w-auto justify-around md:justify-start border-t md:border-t-0 border-gray-800 pt-3 md:pt-0 text-center transition-all">
                <div class="flex flex-col items-center">
                    <span class="text-[9px] md:text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">Pendientes</span>
                    <span class="text-lg md:text-xl font-bold text-red-500 leading-none" id="stat-pending">0</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[9px] md:text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">En Proceso</span>
                    <span class="text-lg md:text-xl font-bold text-blue-500 leading-none" id="stat-progress">0</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[9px] md:text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">Completadas</span>
                    <span class="text-lg md:text-xl font-bold text-green-500 leading-none" id="stat-completed">0</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2 md:gap-3 w-full md:w-auto justify-between md:justify-end">
            <div class="text-xl md:text-2xl font-mono font-bold tracking-widest text-white bg-[#0f1115] px-4 py-1.5 rounded-lg border border-gray-800 hidden lg:block" id="current-time">00:00:00</div>
            
            <!-- BOTONES -->
            <button onclick="openConfigModal()" class="flex justify-center items-center w-10 h-10 md:w-auto md:px-3 md:py-2.5 bg-[#1e293b] hover:bg-[#334155] border border-gray-600 text-gray-400 rounded-md transition-all shadow-md active:scale-95" title="Configuración de APIs">
                <i class="fas fa-cog"></i>
            </button>
            <button onclick="manualSync(false)" class="flex justify-center items-center w-10 h-10 md:w-auto md:px-3 md:py-2.5 bg-[#1e293b] hover:bg-[#334155] border border-blue-500/30 text-blue-400 rounded-md transition-all shadow-md active:scale-95" title="Forzar Sincronización">
                <i class="fas fa-sync-alt" id="sync-icon"></i><span class="hidden md:inline ml-2 text-sm font-bold">Auto-Sync</span>
            </button>
            <button onclick="toggleFullScreen()" id="btn-fullscreen" class="flex justify-center items-center w-10 h-10 md:w-auto md:px-3 md:py-2.5 bg-gray-800 hover:bg-gray-700 text-slate-300 rounded-md transition-all shadow-md active:scale-95" title="Pantalla Completa">
                <i class="fas fa-expand"></i>
            </button>
            <button onclick="openModal()" class="flex-1 md:flex-none flex justify-center items-center gap-2 bg-cyan-600 hover:bg-cyan-500 text-white px-4 py-2 md:py-2.5 rounded-md font-bold transition-all text-sm shadow-md active:scale-95 whitespace-nowrap">
                <i class="fas fa-plus"></i><span class="hidden sm:inline">Nuevo</span>
            </button>
        </div>
    </header>

    <!-- NAVEGACIÓN DE PESTAÑAS -->
    <div class="bg-[#161b22] border-b border-gray-800 flex px-2 md:px-6 overflow-x-auto custom-scrollbar shrink-0">
        <button onclick="switchView('dashboard')" id="tab-dashboard" class="px-5 py-3 text-sm font-bold border-b-2 border-cyan-500 text-cyan-400 transition-colors flex items-center gap-2 whitespace-nowrap bg-[#0f1115]">
            <i class="fas fa-tasks"></i> Tablero Principal
        </button>
        <button onclick="switchView('shopping')" id="tab-shopping" class="px-5 py-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-white transition-colors flex items-center gap-2 whitespace-nowrap">
            <i class="fas fa-shopping-cart"></i> Lista de Compras
        </button>
        <button onclick="switchView('completed')" id="tab-completed" class="px-5 py-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-white transition-colors flex items-center gap-2 whitespace-nowrap">
            <i class="fas fa-check-double"></i> Completadas
        </button>
    </div>

    <main class="flex-1 overflow-x-hidden overflow-y-auto p-3 md:p-6 flex flex-col custom-scrollbar bg-[#0f1115]">
        <div class="flex flex-col gap-4 md:gap-5 w-full max-w-[1300px] mx-auto flex-1 pb-4" id="kanban-board"></div>
        
        <!-- FIRMA DEL AUTOR -->
        <div class="w-full text-center pt-6 pb-2 shrink-0">
            <span class="text-white/40 hover:text-white/90 transition-colors duration-300 text-[10px] md:text-xs font-mono tracking-widest uppercase select-none">
                j. Vizcarra.
            </span>
        </div>
    </main>

    <!-- MODAL CONFIGURACIÓN -->
    <div id="config-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex justify-center items-center backdrop-blur-sm p-4 text-left">
        <div class="bg-[#161b22] border border-gray-700 rounded-xl w-full max-w-lg p-5 md:p-6 shadow-2xl transform transition-all my-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg md:text-xl font-bold text-white uppercase tracking-widest text-xs">Configuración</h2>
                <button onclick="closeConfigModal()" class="text-slate-400 hover:text-white p-1 transition-colors"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block font-semibold text-slate-400 mb-1 uppercase tracking-wider text-[10px]">Google Gemini API Key</label>
                    <input type="password" id="config-api-key" placeholder="AIzaSy..." class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 outline-none text-sm">
                    <p class="text-[9px] text-slate-500 mt-1">Genera tu clave en <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-cyan-400 underline">aistudio.google.com</a></p>
                </div>
                <div>
                    <label class="block font-semibold text-slate-400 mb-1 uppercase tracking-wider text-[10px]">URL de Google Sheets</label>
                    <input type="text" id="config-sheet-url" class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 outline-none text-sm">
                </div>
                <div class="flex justify-end mt-6 pt-4 border-t border-gray-800">
                    <button onclick="closeConfigModal()" class="px-4 py-2 text-sm font-semibold text-slate-300 hover:text-white transition-colors mr-2">Cancelar</button>
                    <button onclick="saveConfig()" class="px-6 py-2 bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-bold rounded-lg shadow-lg active:scale-95 transition-all">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL OBSERVACIÓN -->
    <div id="obs-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex justify-center items-center backdrop-blur-sm p-4 text-left">
        <div class="bg-[#161b22] border border-gray-700 rounded-xl w-full max-w-lg p-5 md:p-6 shadow-2xl transform transition-all my-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg md:text-xl font-bold text-white uppercase tracking-widest text-xs">📝 Añadir Observación</h2>
                <button type="button" onclick="closeObsModal()" class="text-slate-400 hover:text-white p-1 transition-colors"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="obs-form" class="space-y-4">
                <input type="hidden" id="obs-task-id">
                <div>
                    <label class="block font-semibold text-slate-400 mb-1 uppercase tracking-wider text-[10px]" id="obs-task-title">Tarea</label>
                    <textarea id="obs-text" rows="4" placeholder="Escribe aquí las observaciones, detalles o notas finales sobre esta tarea..." class="w-full bg-[#0f1115] border border-cyan-500/50 rounded-lg px-3 py-3 text-white focus:border-cyan-400 outline-none transition-colors shadow-inner text-sm custom-scrollbar"></textarea>
                </div>
                <div class="flex justify-end pt-2">
                    <button type="button" onclick="closeObsModal()" class="px-4 py-2 text-sm font-semibold text-slate-300 hover:text-white transition-colors mr-2">Cancelar</button>
                    <button type="submit" class="px-6 py-2 bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-bold rounded-lg shadow-lg active:scale-95 transition-all">Guardar Observación</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL NUEVA TAREA / EDITAR -->
    <div id="task-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex justify-center items-center backdrop-blur-sm overflow-y-auto p-4 text-left">
        <div class="bg-[#161b22] border border-gray-700 rounded-xl w-full max-w-lg p-5 md:p-6 shadow-2xl transform transition-all my-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title-text" class="text-lg md:text-xl font-bold text-white uppercase tracking-widest text-xs">Añadir Registro</h2>
                <button type="button" onclick="closeModal()" class="text-slate-400 hover:text-white p-1 transition-colors"><i class="fas fa-times text-xl"></i></button>
            </div>

            <!-- ASISTENTE DE VOZ -->
            <div class="mb-5 p-4 bg-gradient-to-r from-cyan-900/30 to-blue-900/30 border border-cyan-500/30 rounded-xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-cyan-500 to-blue-500"></div>
                <label class="block text-sm font-bold text-cyan-400 mb-1 flex items-center gap-2 uppercase tracking-tighter">
                    <i class="fas fa-microphone-lines"></i> Dictado Inteligente
                </label>
                <div class="flex gap-2 mt-2">
                    <div class="relative flex-1">
                        <textarea id="ai-input" placeholder="Hable libremente. El texto se acumulará..." rows="3" class="w-full bg-[#0f1115] border border-cyan-500/50 rounded-lg pl-3 pr-12 py-3 text-white focus:border-cyan-400 outline-none text-sm resize-none custom-scrollbar transition-all"></textarea>
                        <button type="button" onclick="toggleSmartDictation()" class="absolute right-2 bottom-2 w-10 h-10 flex justify-center items-center bg-cyan-600/20 hover:bg-cyan-600/40 text-cyan-400 rounded-md transition-all group" id="btn-smart-mic">
                            <i class="fas fa-microphone text-lg" id="mic-icon"></i>
                        </button>
                    </div>
                </div>
                <div id="ai-status" class="text-[11px] text-cyan-400 mt-2 font-mono font-bold hidden flex flex-col gap-1">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-bolt animate-pulse text-yellow-400" id="ai-spinner"></i> <span id="status-text">Escuchando...</span>
                    </div>
                    <div id="api-error-info" class="text-[9px] text-red-400 italic hidden border-t border-red-900/30 pt-1 mt-1"></div>
                </div>
            </div>

            <form id="new-task-form" class="space-y-4 md:space-y-5">
                <input type="hidden" id="edit-task-id" value="">
                <div>
                    <label class="block font-semibold text-slate-400 mb-2 uppercase tracking-wider text-[10px]">¿Qué deseas añadir?</label>
                    <div class="flex gap-2">
                        <button type="button" onclick="setTaskType('normal')" id="btn-type-normal" class="flex-1 py-2.5 rounded border border-cyan-500 bg-cyan-500/20 text-cyan-300 text-xs font-bold transition-all shadow-inner">💼 Tarea</button>
                        <button type="button" onclick="setTaskType('urgente')" id="btn-type-urgente" class="flex-1 py-2.5 rounded border border-gray-700 bg-[#0f1115] hover:bg-gray-800 text-gray-400 text-xs font-bold transition-all">🔥 Urgente</button>
                        <button type="button" onclick="setTaskType('compra')" id="btn-type-compra" class="flex-1 py-2.5 rounded border border-gray-700 bg-[#0f1115] hover:bg-gray-800 text-gray-400 text-xs font-bold transition-all">🛒 Compra</button>
                    </div>
                    <input type="hidden" id="task-type" value="normal">
                </div>

                <div class="text-left text-xs">
                    <label class="block font-semibold text-slate-400 mb-1 uppercase tracking-wider" id="label-title">Título / Artículo</label>
                    <input type="text" id="task-title" required autocomplete="off" placeholder="Ej: Revisar correos..." class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-3 text-white focus:border-cyan-500 outline-none transition-colors shadow-inner text-sm">
                </div>
                
                <div class="text-left text-xs">
                    <label class="block font-semibold text-slate-400 mb-1 uppercase tracking-wider" id="label-desc">Descripción o Detalles</label>
                    <textarea id="task-desc" rows="2" placeholder="Opcional..." class="w-full bg-[#0f1115] border border-gray-800 rounded-lg px-3 py-2 text-white focus:border-cyan-500 outline-none transition-colors"></textarea>
                </div>
                
                <div class="text-left text-xs" id="category-container">
                    <label class="block font-semibold text-slate-400 mb-1 uppercase">Categoría</label>
                    <input type="text" id="task-cat" value="General" class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4 text-left text-xs" id="datetime-container">
                    <div>
                        <label class="block font-semibold text-slate-400 mb-1 uppercase text-[10px]">Fecha Límite</label>
                        <input type="date" id="task-date" class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white" style="color-scheme: dark;">
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-400 mb-1 uppercase text-[10px]">Hora Límite</label>
                        <input type="time" id="task-time" class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white">
                    </div>
                </div>

                <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-800">
                    <div class="flex gap-3 w-full justify-end">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-semibold text-slate-300 hover:text-white transition-colors">Cancelar</button>
                        <button type="submit" class="px-8 py-2 bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-bold rounded-lg shadow-lg active:scale-95 transition-all">Guardar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- ESTADO Y DATOS LOCALES ---
        let currentView = 'dashboard'; 
        let tasks = JSON.parse(localStorage.getItem('kanban_tasks')) || [];
        // Filtro anti-zombies para tareas eliminadas
        let deletedTaskIds = JSON.parse(localStorage.getItem('kanban_deleted')) || [];

        // --- CONFIGURACIÓN DINÁMICA ---
        let aiKey = localStorage.getItem('app_gemini_key') || "AIzaSyAS994jGxpb0-X9S6pnuC5BDhrRaGiMBEo"; 
        let googleSheetUrl = localStorage.getItem('app_sheet_url') || "https://script.google.com/macros/s/AKfycbxrXvFXX12zA76XRhUabS1a_FpW1sRT6p3tOnT4ngS5nzYWn0bzAPZizp3-oTNaXQZG/exec";

        function openConfigModal() {
            document.getElementById('config-modal').classList.remove('hidden');
            document.getElementById('config-api-key').value = localStorage.getItem('app_gemini_key') || "";
            document.getElementById('config-sheet-url').value = googleSheetUrl;
        }

        function closeConfigModal() {
            document.getElementById('config-modal').classList.add('hidden');
        }

        function saveConfig() {
            const newKey = document.getElementById('config-api-key').value.trim();
            const newUrl = document.getElementById('config-sheet-url').value.trim();
            
            if(newKey) {
                localStorage.setItem('app_gemini_key', newKey);
                aiKey = newKey;
            } else {
                localStorage.removeItem('app_gemini_key');
            }

            if(newUrl) {
                localStorage.setItem('app_sheet_url', newUrl);
                googleSheetUrl = newUrl;
            }
            
            closeConfigModal();
            manualSync(false); 
        }

        const COLUMNS = [
            { id: 'Prioridad Alta', title: '🔥 PRIORIDAD ALTA', bg: 'bg-[#1f1616]' },
            { id: 'En Proceso', title: '⚙️ EN PROCESO', bg: 'bg-[#161c22]' },
            { id: 'Pendientes', title: '📋 PENDIENTES / OTROS', bg: 'bg-[#1a1a1a]' },
            { id: 'Compras', title: '🛒 PARA COMPRAR', bg: 'bg-[#1e1a24]' },
            { id: 'Completadas', title: '✅ COMPLETADAS', bg: 'bg-[#161f18]' }
        ];

        // ==========================================
        // ALARMA SONORA PARA TAREAS URGENTES
        // ==========================================
        let audioCtx = null;
        let beepInterval = null;

        document.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }, { once: true });

        function triggerAlarm(title) {
            const banner = document.getElementById('alarm-banner');
            if (banner.classList.contains('hidden')) {
                document.getElementById('alarm-task-title').innerText = title;
                banner.classList.remove('hidden');
                
                if (!beepInterval) {
                    beepInterval = setInterval(() => {
                        if (audioCtx) {
                            if(audioCtx.state === 'suspended') audioCtx.resume();
                            const osc = audioCtx.createOscillator();
                            const gain = audioCtx.createGain();
                            osc.type = 'square';
                            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                            osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.2);
                            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                            osc.connect(gain);
                            gain.connect(audioCtx.destination);
                            osc.start();
                            osc.stop(audioCtx.currentTime + 0.4);
                        }
                    }, 1500);
                }
            }
        }

        function stopAlarm() {
            document.getElementById('alarm-banner').classList.add('hidden');
            if (beepInterval) {
                clearInterval(beepInterval);
                beepInterval = null;
            }

            let updated = false;
            const now = new Date();
            
            tasks.forEach(t => {
                if (t.priority === 'Alta' && t.progress < 100 && !t.alarmStopped) {
                    if(t.date && t.time) {
                        const taskTime = new Date(`${t.date}T${t.time}`);
                        if (!isNaN(taskTime.getTime())) {
                            const diffHours = (taskTime - now) / (1000 * 60 * 60);
                            if (diffHours <= 1 && diffHours > -24) {
                                t.alarmStopped = true;
                                updated = true;
                            }
                        }
                    }
                }
            });

            if(updated) saveTasks();
        }

        function checkAlarms() {
            const now = new Date();
            let ringingTitle = null;

            tasks.forEach(task => {
                if (task.priority === 'Alta' && task.progress < 100 && !task.alarmStopped) {
                    if(task.date && task.time) {
                        const taskTime = new Date(`${task.date}T${task.time}`);
                        if (!isNaN(taskTime.getTime())) {
                            const diffMs = taskTime - now;
                            const diffHours = diffMs / (1000 * 60 * 60);
                            if (diffHours <= 1 && diffHours > -24) {
                                ringingTitle = task.title;
                            }
                        }
                    }
                }
            });

            if (ringingTitle) triggerAlarm(ringingTitle);
        }
        setInterval(checkAlarms, 10000);

        // ==========================================
        // CONEXIÓN ROBUSTA CON GOOGLE SHEETS
        // ==========================================
        async function fetchTasksFromSheets() {
            try {
                const response = await fetch(googleSheetUrl);
                const data = await response.json();
                
                if(Array.isArray(data)) {
                    const now = Date.now();
                    
                    // Limpiar filtro Anti-Zombies (borrar IDs viejos de más de 30 mins)
                    deletedTaskIds = deletedTaskIds.filter(d => now - d.time < 1800000);
                    localStorage.setItem('kanban_deleted', JSON.stringify(deletedTaskIds));
                    const justDeletedIds = deletedTaskIds.map(d => d.id);

                    // Filtrar datos que vienen del servidor para quitar los eliminados recientes (anti-zombie)
                    const validServerData = data.filter(serverTask => !justDeletedIds.includes(serverTask.id));

                    const mergedTasks = validServerData.map(serverTask => {
                        // Arreglar fechas
                        if (serverTask.date && serverTask.date.includes('T')) serverTask.date = serverTask.date.split('T')[0];
                        if (serverTask.time && serverTask.time.includes('T')) serverTask.time = serverTask.time.split('T')[1].substring(0, 5);
                        else if (serverTask.time && serverTask.time.length > 5) serverTask.time = serverTask.time.substring(0, 5);
                        
                        const localTask = tasks.find(t => t.id === serverTask.id);
                        if (localTask) {
                            if (localTask.alarmStopped) serverTask.alarmStopped = true;
                            
                            // BLINDAJE ANTI-SOBREESCRITURA (RACE CONDITION)
                            // Si el usuario modificó esta tarea en los últimos 2 minutos, Google Sheets no la sobreescribe.
                            if (localTask.lastModified && (now - localTask.lastModified < 120000)) {
                                return localTask;
                            }
                        }
                        return serverTask;
                    });

                    // Identificar si tenemos tareas NUEVAS locales que el servidor aún no tiene y las preservamos
                    const serverIds = mergedTasks.map(t => t.id);
                    const pendingLocalTasks = tasks.filter(t => !serverIds.includes(t.id) && t.lastModified && (now - t.lastModified < 120000));

                    tasks = [...mergedTasks, ...pendingLocalTasks];
                    saveTasks(); 
                }
            } catch (error) {
                console.error("Error al cargar desde Google Sheets:", error);
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
                renderBoard();
                checkAlarms(); 
            }
        }

        function sendToGoogleSheets(taskData) {
            // Indicador visual de guardado (Gira el icono en verde)
            const icon = document.getElementById('sync-icon');
            if(icon) {
                icon.classList.add('animate-spin', 'sync-saving');
            }

            fetch(googleSheetUrl, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(taskData)
            }).then(() => {
                // Al terminar de enviar, detenemos la animación tras 1 segundo
                setTimeout(() => {
                    if(icon) icon.classList.remove('animate-spin', 'sync-saving');
                }, 1000);
            }).catch(error => {
                console.error(error);
                if(icon) icon.classList.remove('animate-spin', 'sync-saving');
            });
        }

        function saveTasks() {
            localStorage.setItem('kanban_tasks', JSON.stringify(tasks));
        }

        // ==========================================
        // ACCIONES DE TAREAS Y OBSERVACIONES
        // ==========================================
        function updateTaskProgress(id, val) {
            const task = tasks.find(t => t.id === id);
            if(task) {
                task.lastModified = Date.now(); // SELLO DE TIEMPO

                if(task.category === 'Compras' || task.status === 'Compras') {
                    task.progress = val;
                    task.status = 'Compras'; 
                } else {
                    task.progress = val;
                    if(val === 100) task.status = 'Completadas';
                    else if(task.priority === 'Alta') task.status = 'Prioridad Alta'; 
                    else if(val > 0) task.status = 'En Proceso';
                    else task.status = 'Pendientes';
                }
                
                saveTasks();
                renderBoard();
                sendToGoogleSheets(task);
            }
        }

        function deleteTask(id) {
            if(confirm("¿Estás seguro de eliminar este registro?")) {
                tasks = tasks.filter(t => t.id !== id);
                
                // Guardar en Anti-Zombies
                deletedTaskIds.push({id: id, time: Date.now()});
                localStorage.setItem('kanban_deleted', JSON.stringify(deletedTaskIds));
                
                saveTasks();
                renderBoard();
                sendToGoogleSheets({ id: id, action: 'delete' });
            }
        }

        // ==========================================
        // MICRÓFONO E IA GEMINI
        // ==========================================
        let recognition = null;
        let isRecording = false;
        let finalHistory = ""; 

        function toggleSmartDictation() {
            const inputEl = document.getElementById('ai-input');
            const iconEl = document.getElementById('mic-icon');
            const statusEl = document.getElementById('ai-status');

            if (isRecording) {
                isRecording = false;
                if (recognition) recognition.stop();
                iconEl.className = "fas fa-microphone text-lg";
                iconEl.classList.remove('mic-active');
                if(inputEl.value.trim().length > 3) processWithGemini(inputEl.value);
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Tu navegador no soporta la API de voz. Te sugerimos usar Chrome o Edge."); return; }
            
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = true;
            recognition.interimResults = true;
            
            finalHistory = inputEl.value;

            recognition.onstart = () => {
                isRecording = true;
                iconEl.className = "fas fa-stop text-lg";
                iconEl.classList.add('mic-active');
                statusEl.classList.remove('hidden');
                document.getElementById('status-text').innerText = "Escuchando... El texto se acumulará.";
                document.getElementById('api-error-info').classList.add('hidden');
                window.lastConfirmedPhrase = ""; 
            };

            recognition.onresult = (event) => {
                let interimTranscript = "";
                let confirmedThisSession = "";

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        confirmedThisSession += transcript + " ";
                    } else {
                        interimTranscript += transcript;
                    }
                }
                
                if (confirmedThisSession) {
                    if (window.lastConfirmedPhrase !== confirmedThisSession) {
                        finalHistory = (finalHistory.trim() ? finalHistory.trim() + " " : "") + confirmedThisSession;
                        window.lastConfirmedPhrase = confirmedThisSession;
                    }
                }

                inputEl.value = (finalHistory + interimTranscript).trim();
                inputEl.scrollTop = inputEl.scrollHeight;
            };

            recognition.onend = () => {
                if (isRecording) {
                    try { recognition.start(); } catch(e){} 
                }
            };
            recognition.start();
        }

        async function processWithGemini(text) {
            const statusEl = document.getElementById('ai-status');
            const statusText = document.getElementById('status-text');
            const spinner = document.getElementById('ai-spinner');
            const errorInfo = document.getElementById('api-error-info');

            statusEl.classList.remove('hidden');
            errorInfo.classList.add('hidden');
            statusText.innerText = "IA procesando campos...";
            spinner.className = "fas fa-bolt animate-pulse text-yellow-400";

            if (!aiKey) {
                document.getElementById('task-title').value = text;
                setTaskType('normal');
                statusText.innerText = "Texto pegado sin IA";
                spinner.className = "fas fa-exclamation-triangle text-yellow-400";
                errorInfo.innerHTML = `<b>Aviso:</b> Falta la API Key de Gemini. Ve a configuración (⚙️) para añadirla. <br/><i>Tu texto se salvó en el título.</i>`;
                errorInfo.classList.remove('hidden');
                return;
            }
            
            const prompt = `Actúa como un asistente de extracción de datos.
Texto: "${text}". 
Devuelve ÚNICAMENTE un objeto JSON con este formato exacto: {"title": "resumen muy corto", "desc": "detalles completos", "category": "Compras" o "General", "priority": "Alta" o "Baja"}`;

            try {
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${aiKey}`;
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || `Error del servidor: ${response.status}`);
                }

                const result = await response.json();
                let rawContent = result.candidates[0].content.parts[0].text;
                rawContent = rawContent.replace(/```json/g, '').replace(/```/g, '').trim();
                const data = JSON.parse(rawContent);

                document.getElementById('task-title').value = data.title || "";
                document.getElementById('task-desc').value = data.desc || "";
                
                if (data.category && data.category.toLowerCase().includes("compra")) setTaskType('compra');
                else if (data.priority === "Alta") setTaskType('urgente');
                else {
                    setTaskType('normal');
                    document.getElementById('task-cat').value = data.category || "General";
                }

                statusText.innerText = "¡Campos rellenados con éxito!";
                spinner.className = "fas fa-check-circle text-green-400";
                setTimeout(() => statusEl.classList.add('hidden'), 3000);

            } catch (e) {
                console.error("Error Gemini:", e);
                document.getElementById('task-title').value = text;
                setTaskType('normal');
                statusText.innerText = "Texto pegado sin IA";
                spinner.className = "fas fa-exclamation-triangle text-yellow-400";
                
                let userFriendlyError = e.message;
                if (userFriendlyError.includes("API_KEY_INVALID")) userFriendlyError = "Tu API Key es inválida o está vencida.";
                
                errorInfo.innerHTML = `<b>Aviso IA:</b> ${userFriendlyError}. <br/><i>El texto se pegó en el título.</i>`;
                errorInfo.classList.remove('hidden');
            }
        }

        // INICIO DE LA APLICACIÓN
        switchView('dashboard'); 
        fetchTasksFromSheets();

    </script>
