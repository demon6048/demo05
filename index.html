<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Control Diario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f1115; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        .dragging { opacity: 0.5; }
        
        /* Ocultar scrollbar en el contenedor principal pero permitir scroll */
        .board-container { scrollbar-width: thin; scrollbar-color: #334155 #0f1115; }
    </style>
</head>
<body class="bg-[#0f1115] text-slate-200 font-sans h-screen flex flex-col overflow-hidden selection:bg-blue-500/30">

    <!-- HEADER -->
    <header class="bg-[#161b22] border-b border-gray-800 p-4 md:p-6 flex flex-col md:flex-row justify-between items-center gap-4 shadow-md z-10">
        <div class="flex items-center gap-6">
            <div class="flex flex-col">
                <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-white flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-blue-500 animate-pulse" id="sync-indicator"></div>
                    Centro de Control Diario
                </h1>
                <p class="text-slate-400 text-sm capitalize" id="current-date"></p>
            </div>
            <div class="hidden lg:flex gap-4 ml-8 border-l border-gray-700 pl-8">
                <div class="flex flex-col items-center">
                    <span class="text-xs text-slate-500 font-semibold uppercase tracking-wider">Pendientes</span>
                    <span class="text-xl font-bold text-red-400" id="stat-pending">0</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-xs text-slate-500 font-semibold uppercase tracking-wider">En Proceso</span>
                    <span class="text-xl font-bold text-blue-400" id="stat-progress">0</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-xs text-slate-500 font-semibold uppercase tracking-wider">Completadas</span>
                    <span class="text-xl font-bold text-green-400" id="stat-completed">0</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="text-3xl font-mono font-bold tracking-widest text-white bg-black/30 px-4 py-2 rounded-lg border border-gray-800" id="current-time">
                00:00:00
            </div>
            
            <button onclick="toggleFullscreen()" class="p-2.5 bg-[#1f242d] hover:bg-gray-700 rounded-lg transition-colors border border-gray-700 text-slate-300">
                <i class="fas fa-expand"></i>
            </button>
            
            <button onclick="openModal()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-lg font-semibold transition-all shadow-lg shadow-blue-900/20 active:scale-95">
                <i class="fas fa-plus"></i>
                <span class="hidden sm:inline">Nueva Tarea</span>
            </button>
        </div>
    </header>

    <!-- BOARD MAIN AREA (Cambiado a vista de lista vertical) -->
    <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-6 custom-scrollbar board-container">
        <div class="flex flex-col gap-6 w-full max-w-7xl mx-auto pb-10" id="kanban-board">
            <!-- Las secciones se generarán por JS -->
        </div>
    </main>

    <!-- MODAL NUEVA TAREA -->
    <div id="task-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex justify-center items-center backdrop-blur-sm">
        <div class="bg-[#161b22] border border-gray-700 rounded-xl w-full max-w-md p-6 shadow-2xl transform transition-all">
            <h2 class="text-xl font-bold text-white mb-4">Añadir Nueva Tarea</h2>
            <form id="new-task-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Título de la tarea</label>
                    <input type="text" id="task-title" required class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Descripción corta</label>
                    <textarea id="task-desc" rows="2" class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1">Categoría</label>
                        <input type="text" id="task-cat" value="General" class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1">Prioridad</label>
                        <select id="task-prio" class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none">
                            <option value="Alta">Alta</option>
                            <option value="Media" selected>Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1">Fecha</label>
                        <input type="date" id="task-date" required class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none" style="color-scheme: dark;">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1">Hora</label>
                        <input type="time" id="task-time" required class="w-full bg-[#0f1115] border border-gray-700 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none" style="color-scheme: dark;">
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-800">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-semibold text-slate-300 hover:text-white transition-colors">Cancelar</button>
                    <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold rounded-lg shadow-lg transition-all" id="btn-save">
                        Guardar Tarea
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN DE GOOGLE SHEETS API
        // ==========================================
        // PEGA AQUÍ LA URL DE TU WEB APP DE APPS SCRIPT
        const GOOGLE_API_URL = ""; 
        
        // Datos locales iniciales (Fallback si no hay API)
        let tasks = [
            { id: 't1', title: 'Revisión de Servidores', desc: 'Chequeo de logs', category: 'Mantenimiento', priority: 'Alta', status: 'Prioridad Alta', progress: 0, date: '2026-03-21', time: '10:00' },
            { id: 't2', title: 'Reunión Cliente X', desc: 'Presentar cotización', category: 'Ventas', priority: 'Media', status: 'Pendientes', progress: 0, date: '2026-03-22', time: '11:00' }
        ];

        const COLUMNS = [
            { id: 'Prioridad Alta', title: '🔥 PRIORIDAD ALTA', color: 'border-red-500', bg: 'bg-red-500/10' },
            { id: 'En Proceso', title: '⚙️ EN PROCESO', color: 'border-blue-500', bg: 'bg-blue-500/10' },
            { id: 'Pendientes', title: '📋 PENDIENTES / OTROS', color: 'border-gray-500', bg: 'bg-gray-500/10' },
            { id: 'Completadas', title: '✅ COMPLETADAS', color: 'border-green-500', bg: 'bg-green-500/10' }
        ];

        // ==========================================
        // LOGICA DE INTERFAZ Y RELOJ
        // ==========================================
        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('current-date').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // ==========================================
        // RENDERIZADO DEL KANBAN
        // ==========================================
        function renderBoard() {
            const board = document.getElementById('kanban-board');
            board.innerHTML = '';

            // Actualizar Stats
            document.getElementById('stat-pending').innerText = tasks.filter(t => t.status === 'Pendientes' || t.status === 'Prioridad Alta').length;
            document.getElementById('stat-progress').innerText = tasks.filter(t => t.status === 'En Proceso').length;
            document.getElementById('stat-completed').innerText = tasks.filter(t => t.status === 'Completadas').length;

            COLUMNS.forEach(col => {
                const colTasks = tasks.filter(t => t.status === col.id);
                
                // Contenedor de categoría que ocupa todo el ancho
                let colHTML = `
                <div class="w-full flex flex-col bg-[#161b22] rounded-xl border border-gray-800/60 shadow-xl"
                     ondragover="handleDragOver(event)" ondrop="handleDrop(event, '${col.id}')">
                    <div class="p-3 md:p-4 border-b border-gray-800 flex justify-between items-center ${col.bg} rounded-t-xl">
                        <h2 class="font-bold text-sm tracking-widest text-slate-200 uppercase">${col.title}</h2>
                        <span class="bg-[#0f1115] text-slate-400 text-xs px-2.5 py-1 rounded-full font-bold">${colTasks.length}</span>
                    </div>
                    <div class="p-3 md:p-4 flex flex-col gap-3 min-h-[100px]">
                `;

                if (colTasks.length === 0) {
                    colHTML += `<div class="flex justify-center items-center h-16 border-2 border-dashed border-gray-800 rounded-xl text-slate-600 text-sm">Arrastra tareas aquí o añade una nueva</div>`;
                }

                colTasks.forEach(task => {
                    let prioColor = task.priority === 'Alta' ? 'bg-red-500' : task.priority === 'Media' ? 'bg-yellow-500' : 'bg-blue-500';
                    let barColor = task.progress === 100 ? 'bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]' : task.progress > 50 ? 'bg-blue-500' : 'bg-yellow-500';
                    let iconPrio = task.priority === 'Alta' ? 'fa-fire text-red-400' : task.priority === 'Media' ? 'fa-bolt text-yellow-400' : 'fa-check text-blue-400';
                    
                    // Diseño de lista horizontal ancha para cada tarea
                    colHTML += `
                    <div draggable="true" ondragstart="handleDragStart(event, '${task.id}')" ondragend="handleDragEnd(event)" 
                         class="flex flex-col md:flex-row items-start md:items-center gap-4 bg-[#1c212b] border border-gray-700/50 rounded-xl p-3 md:p-4 shadow-lg hover:border-gray-500 cursor-grab relative overflow-hidden transition-all">
                        <div class="absolute left-0 top-0 bottom-0 w-1 ${prioColor}"></div>
                        
                        <div class="flex-1 pl-2 w-full md:w-auto">
                            <div class="flex items-center gap-3 mb-1.5">
                                <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 bg-[#0f1115] px-2 py-0.5 rounded border border-gray-800">${task.category}</span>
                                <span class="text-[10px] font-bold uppercase text-slate-400"><i class="fas ${iconPrio}"></i> ${task.priority}</span>
                            </div>
                            <h3 class="font-bold text-white text-base md:text-lg leading-tight mb-1">${task.title}</h3>
                            <p class="text-sm text-slate-400 line-clamp-1">${task.desc}</p>
                        </div>
                        
                        <div class="flex md:flex-col items-center justify-between md:justify-center gap-2 w-full md:w-36 bg-[#0f1115] p-2.5 rounded-lg border border-gray-800 shrink-0">
                            <div class="text-xs text-slate-400"><i class="far fa-calendar-alt"></i> ${task.date}</div>
                            <div class="text-sm font-mono font-bold text-blue-400"><i class="far fa-clock"></i> ${task.time}</div>
                        </div>
                        
                        <div class="w-full md:w-72 flex flex-col gap-2 shrink-0">
                            <div class="flex justify-between items-end">
                                <span class="text-xs font-semibold text-slate-300 uppercase">Avance</span>
                                <span class="text-sm font-bold font-mono ${task.progress===100?'text-green-400':'text-blue-400'}">${task.progress}%</span>
                            </div>
                            <div class="w-full h-2 bg-gray-800 rounded-full overflow-hidden">
                                <div class="h-full transition-all duration-500 ${barColor}" style="width: ${task.progress}%"></div>
                            </div>
                            ${task.progress < 100 ? `
                            <div class="flex gap-2 mt-1">
                                <button onclick="updateProgress('${task.id}', 10)" class="flex-1 bg-gray-800 hover:bg-gray-700 text-xs py-1.5 rounded text-slate-300 transition-colors">+10%</button>
                                <button onclick="updateProgress('${task.id}', 25)" class="flex-1 bg-gray-800 hover:bg-gray-700 text-xs py-1.5 rounded text-slate-300 transition-colors">+25%</button>
                                <button onclick="updateProgress('${task.id}', 100)" class="flex-1 bg-blue-900/30 hover:bg-blue-600/40 text-blue-400 text-xs py-1.5 border border-blue-800/50 rounded transition-colors"><i class="fas fa-check"></i> Finalizar</button>
                            </div>` : ''}
                        </div>
                    </div>`;
                });

                colHTML += `</div></div>`;
                board.innerHTML += colHTML;
            });
        }

        // ==========================================
        // DRAG & DROP Y LÓGICA
        // ==========================================
        function handleDragStart(e, id) {
            e.dataTransfer.setData('text/plain', id);
            setTimeout(() => e.target.classList.add('opacity-50'), 0);
        }
        function handleDragEnd(e) { e.target.classList.remove('opacity-50'); }
        function handleDragOver(e) { e.preventDefault(); }
        
        function handleDrop(e, status) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text/plain');
            const task = tasks.find(t => t.id === id);
            if(task) {
                task.status = status;
                if(status === 'Completadas') task.progress = 100;
                renderBoard();
                syncTaskWithCloud(task); // Sincronizar actualización
            }
        }

        function updateProgress(id, add) {
            const task = tasks.find(t => t.id === id);
            if(task) {
                if(add === 100) task.progress = 100;
                else task.progress = Math.min(100, task.progress + add);
                
                if(task.progress === 100) task.status = 'Completadas';
                renderBoard();
                syncTaskWithCloud(task); // Sincronizar actualización
            }
        }

        // ==========================================
        // MODAL Y FORMULARIO
        // ==========================================
        function openModal() { document.getElementById('task-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('task-modal').classList.add('hidden'); document.getElementById('new-task-form').reset(); }

        document.getElementById('new-task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('btn-save').innerText = 'Guardando...';
            
            const newTask = {
                id: 't' + Date.now(),
                title: document.getElementById('task-title').value,
                desc: document.getElementById('task-desc').value,
                category: document.getElementById('task-cat').value,
                priority: document.getElementById('task-prio').value,
                status: document.getElementById('task-prio').value === 'Alta' ? 'Prioridad Alta' : 'Pendientes',
                progress: 0,
                date: document.getElementById('task-date').value,
                time: document.getElementById('task-time').value
            };

            tasks.push(newTask);
            renderBoard();
            
            // Subir a Google Sheets
            await syncTaskWithCloud(newTask);
            
            closeModal();
            document.getElementById('btn-save').innerText = 'Guardar Tarea';
        });

        // ==========================================
        // INTEGRACIÓN CON GOOGLE SHEETS
        // ==========================================
        
        // 1. Obtener datos al cargar
        async function fetchTasksFromCloud() {
            if(!GOOGLE_API_URL) {
                renderBoard(); return; // Usa mock si no hay API
            }
            try {
                document.getElementById('sync-indicator').classList.replace('bg-blue-500', 'bg-yellow-500'); // Cargando
                const response = await fetch(GOOGLE_API_URL);
                const data = await response.json();
                if(data && data.length > 0) {
                    tasks = data; 
                }
                renderBoard();
                document.getElementById('sync-indicator').classList.replace('bg-yellow-500', 'bg-green-500'); // OK
            } catch (error) {
                console.error('Error cargando tareas:', error);
                document.getElementById('sync-indicator').classList.replace('bg-blue-500', 'bg-red-500'); // Error
                renderBoard(); // Renderiza locales en caso de error
            }
        }

        // 2. Enviar datos (Añadir/Actualizar)
        async function syncTaskWithCloud(task) {
            if(!GOOGLE_API_URL) return;
            try {
                // Se envía por método POST
                await fetch(GOOGLE_API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Evita bloqueos de CORS de Google
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(task)
                });
                console.log("Sincronizado con Google Sheets");
            } catch (error) {
                console.error("Error sincronizando:", error);
            }
        }

        // Iniciar
        fetchTasksFromCloud();

    </script>
</body>
</html>
